<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake AI | Jesus Gonzalez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff2bd6;
    --neon-green: #39ff14;
    --text: #e6e6f0;
    --muted: #7a7a8c;
    --grid: rgba(0, 240, 255, 0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(255, 43, 214, 0.15), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 240, 255, 0.15), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 60px 24px; position: relative; z-index: 1; }
  header {
    border: 1px solid rgba(0, 240, 255, 0.3);
    padding: 32px;
    margin-bottom: 40px;
    background: rgba(18, 18, 26, 0.7);
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    animation: scan 4s linear infinite;
  }
  @keyframes scan { to { left: 100%; } }
  .tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--neon-magenta);
    border: 1px solid var(--neon-magenta);
    padding: 4px 12px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 8px;
    color: var(--text);
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
  }
  h1 .accent { color: var(--neon-cyan); }
  .subtitle { color: var(--muted); font-size: 14px; letter-spacing: 1px; }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 32px;
  }
  .info-card {
    border-left: 2px solid var(--neon-green);
    padding: 12px 16px;
    background: rgba(57, 255, 20, 0.03);
  }
  .info-card .label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--neon-green);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-card .value { font-size: 18px; color: var(--text); }
  .game-section {
    border: 1px solid rgba(255, 43, 214, 0.3);
    padding: 32px;
    background: rgba(18, 18, 26, 0.7);
    backdrop-filter: blur(10px);
  }
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .game-title {
    font-family: 'Syncopate', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #ff0000, #ff9900, #ffff00, #00ff00, #00ffff, #0099ff, #ff00ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }
  .stats { display: flex; gap: 24px; font-size: 14px; }
  .stat { display: flex; flex-direction: column; }
  .stat .k { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .stat .v { font-size: 20px; font-weight: 700; color: var(--neon-cyan); }
  .canvas-wrap {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: #000;
    border: 1px solid rgba(0, 240, 255, 0.2);
    box-shadow: inset 0 0 40px rgba(0, 240, 255, 0.1);
  }
  canvas { image-rendering: pixelated; max-width: 100%; height: auto; }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 40px;
    text-transform: uppercase;
  }
  footer .blink { color: var(--neon-green); animation: blink 1.2s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="container">
    <header>
      <span class="tag">// PROFILE.SYS</span>
      <h1>JESUS <span class="accent">GONZALEZ</span></h1>
      <p class="subtitle">&gt; Estudiante universitario_</p>
      <div class="info-grid">
        <div class="info-card">
          <div class="label">Nombre</div>
          <div class="value">Jesus Gonzalez</div>
        </div>
        <div class="info-card">
          <div class="label">Carrera</div>
          <div class="value">I. Computación</div>
        </div>
        <div class="info-card">
          <div class="label">Semestre</div>
          <div class="value">6° Semestre</div>
        </div>
      </div>
    </header>

    <section class="game-section">
      <div class="game-header">
        <div class="game-title">&gt; Snake_AI</div>
        <div class="stats">
          <div class="stat"><span class="k">Score</span><span class="v" id="score">0</span></div>
          <div class="stat"><span class="k">Best</span><span class="v" id="best">0</span></div>
          <div class="stat"><span class="k">Length</span><span class="v" id="length">3</span></div>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="game" width="600" height="600"></canvas>
      </div>
    </section>

    <footer>
      <span class="blink">●</span> AUTO-PLAYING &nbsp;|&nbsp; RAINBOW MODE ACTIVE
    </footer>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 30;
const CELL = canvas.width / GRID;
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const lengthEl = document.getElementById('length');
let snake, dir, food, score, best = 0;
let hueOffset = 0;

function reset() {
  snake = [{x: 15, y: 15}, {x: 14, y: 15}, {x: 13, y: 15}];
  dir = {x: 1, y: 0};
  score = 0;
  placeFood();
  updateUI();
}
function placeFood() {
  while (true) {
    const f = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
    if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
  }
}
function findPath(start, goal, body) {
  const occupied = new Set(body.map(b => b.x + ',' + b.y));
  const queue = [[start]];
  const visited = new Set([start.x + ',' + start.y]);
  const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  while (queue.length) {
    const path = queue.shift();
    const head = path[path.length - 1];
    if (head.x === goal.x && head.y === goal.y) return path;
    for (const d of dirs) {
      const nx = head.x + d.x, ny = head.y + d.y;
      const k = nx + ',' + ny;
      if (nx<0||nx>=GRID||ny<0||ny>=GRID) continue;
      if (visited.has(k)) continue;
      if (occupied.has(k)) continue;
      visited.add(k);
      queue.push([...path, {x:nx, y:ny}]);
    }
  }
  return null;
}
function followTail() {
  const head = snake[0];
  const tail = snake[snake.length - 1];
  const body = snake.slice(0, -1);
  return findPath(head, tail, body);
}
function anySafeMove() {
  const head = snake[0];
  const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  for (const d of dirs) {
    const nx = head.x + d.x, ny = head.y + d.y;
    if (nx<0||nx>=GRID||ny<0||ny>=GRID) continue;
    if (snake.some(s => s.x === nx && s.y === ny)) continue;
    return d;
  }
  return null;
}
function decideDir() {
  const head = snake[0];
  let path = findPath(head, food, snake);
  if (!path) path = followTail();
  if (path && path.length > 1) {
    const next = path[1];
    return { x: next.x - head.x, y: next.y - head.y };
  }
  return anySafeMove() || dir;
}
function step() {
  dir = decideDir();
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    if (score > best) best = score;
    reset();
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    placeFood();
  } else {
    snake.pop();
  }
  updateUI();
}
